name: scrape-instagram

on:
  schedule:
    - cron: "0 15 * * *" # 23:00 Asia/Taipei = 15:00 UTC
  workflow_dispatch:

concurrency:
  group: scrape-instagram
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome and ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Show browser versions
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          echo "ChromeDriver path: ${{ steps.setup-chrome.outputs.chromedriver-path }}"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
          "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data files exist
        run: |
          mkdir -p data
          [ -f data/kol_info.csv ] || printf "kol_account\ninstagram\n" > data/kol_info.csv
          [ -f data/reels_static_info.csv ] || printf "kol_account,reels_shortcode,post_time,duration,caption\n" > data/reels_static_info.csv
          [ -f data/reels_dynamic_info.csv ] || printf "reels_shortcode,views,plays,likes,comments,timestamp\n" > data/reels_dynamic_info.csv
          [ -f data/profile_post_state.csv ] || printf "kol_account,profile_post_count,last_checked_at,last_changed_at,check_status\n" > data/profile_post_state.csv

      - name: Run scraper
        env:
          TZ: Asia/Taipei
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python -u main.py

      - name: Save debug HTML on failure
        if: failure()
        env:
          TZ: Asia/Taipei
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python debug_html.py || true

      - name: Upload debug artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-debug-html
          path: debug/
          if-no-files-found: ignore

      - name: Commit and push CSV updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git diff --cached --quiet || git commit -m "Update Instagram CSV data"
          git push
